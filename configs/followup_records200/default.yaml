# Follow-up vanilla FedAvg on MIT-BIH records 200-234.
# Mirrors configs/default.yaml exactly, except for the record set and the
# per-experiment output directory. No hyperparameter tuning — the goal is to
# expose the dataset's class-balance shift, not to chase headline numbers.
#
# Class balance for records 200-234 (verified 2026-05-01, 61 818 beats):
#   N 82.08%  S 4.19%  V 9.53%  F 1.28%  Q 2.93%
# vs records 100-115 (N 97.09% / rare classes ≤0.03%).

experiment:
  name: followup_records200_vanilla
  output_dir: results/followup_records200/vanilla_fedavg
  seed: 42

data:
  source: mitbih
  cache_dir: data/cache
  records: [200, 201, 202, 203, 205, 207, 208, 209, 210, 212,
            213, 214, 215, 217, 219, 220, 221, 222, 223, 228,
            230, 231, 232, 233, 234]
  window_size: 360
  num_classes: 5
  test_fraction: 0.2

partitioning:
  scheme: dirichlet
  dirichlet_alpha: 0.5
  min_samples_per_client: 50

federation:
  num_clients: 4
  clients_per_round: 4
  num_rounds: 10
  local_epochs: 2
  local_batch_size: 32

model:
  name: ecg_cnn
  dropout: 0.3

optimization:
  optimizer: sgd
  learning_rate: 0.01
  momentum: 0.9
  weight_decay: 0.0001

privacy:
  differential_privacy:
    enabled: false
  secure_aggregation:
    enabled: false
  compression:
    enabled: false

evaluation:
  evaluate_every: 1
  metrics: [accuracy, macro_f1, per_class_f1]

logging:
  level: INFO
  log_to_file: true
